patterns:
  KEYWORDS_PIPELINE:
    - block
    - define
    - else\swith
    - else\s+if
    - range
    - return
    - template
    - try
    - with
    - if
  KEYWORDS_STANDALONE:
    - break
    - continue
    - else
    - end

scopes:
  BUILTINS:
    - urlquery
    - println
    - printf
    - index
    - print
    - slice
    - call
    - html
    - and
    - len
    - not
    - eq
    - ge
    - gt
    - js
    - le
    - lt
    - ne
    - or
  LITERALS:
    - "false"
    - nil
    - "true"

generate:
  LITERALS: ['kw']
  BUILTINS: ['kw']
  FUNCTIONS: []
  KEYWORDS:  []
