{{- /*
   Dump the keyword map computed by get-keywords.html as YAML, purely
   for human inspection (e.g. to review which names were extracted and
   classified from the hugoDocs function reference). No effect on the
   keywords.js output generated by page.js.
   */
-}}
{{- $tpl := templates.Current.Name -}}
{{- $pagePath := .Path -}}
{{- $idx := math.Counter -}}
{{- $lang := .Params.keywords -}}
{{- warnf "[%04d][ %-20s ] : %s :: %s" $idx $tpl $pagePath $lang -}}
{{- $result := partialCached "get-keywords.html" $lang $lang -}}
{{- $keywords := $result.scopes -}}
{{- $builtinAliases := $result.builtinAliases -}}
{{- $dataKeywords := index hugo.Data.keywords $lang -}}

{{- /* NOTE: bare `slice`/zero-length values below are deliberately derived
   via `after 1 (slice X)` rather than a fresh empty `slice` -- see
   get-keywords.html for why (shared zero-capacity pointer corrupts
   transform.Remarshal's YAML output otherwise). */ -}}

{{- /* --- BUILTINS: $builtinAliases (functionFullName -> [alias...]) plus
   every preset BUILTINS word not already accounted for there --- */ -}}
{{- $knownAliases := slice -}}
{{- range $name, $aliases := $builtinAliases -}}
   {{- $knownAliases = $knownAliases | append $aliases -}}
{{- end -}}
{{- $builtins := $builtinAliases -}}
{{- range $word := (index $dataKeywords "scopes" "BUILTINS") -}}
   {{- if and (not (in $knownAliases $word)) (not (isset $builtins $word)) -}}
      {{- $builtins = merge $builtins (dict $word (after 1 (slice $word))) -}}
   {{- end -}}
{{- end -}}

{{- /* --- KEYWORDS: patterns.KEYWORDS_PIPELINE + KEYWORDS_STANDALONE, "\s+" -> " ", sorted --- */ -}}
{{- $patterns := index $dataKeywords "patterns" -}}
{{- $rawWords := (index $patterns "KEYWORDS_PIPELINE") | append (index $patterns "KEYWORDS_STANDALONE") -}}
{{- $kwWords := slice -}}
{{- range $w := $rawWords -}}
   {{- $kwWords = $kwWords | append (replace $w `\s+` " ") -}}
{{- end -}}

{{- /* --- assemble output: exactly 3 top-level keys, FUNCTIONS dropped (absorbed into BUILTINS) --- */ -}}
{{- $out := dict "KEYWORDS" (sort $kwWords) "BUILTINS" $builtins "LITERALS" (index $keywords "LITERALS") -}}
{{- transform.Remarshal "yaml" $out -}}
