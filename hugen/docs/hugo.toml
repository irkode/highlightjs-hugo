baseURL = "https://irkode.github.io/highlightjs-hugo/"
locale  = 'en-US'
title   = "Highlight 4 Hugo"

disableKinds  = ['rss', 'taxonomy', 'term']
enableGitInfo = true
theme         = "huggingface"

[params]
   description = "Advanced syntax highlighting for HuGo templates"
   [params.h4h]
      repository = "https://github.com/irkode/highlightjs-hugo/"

   [params.huggingface]
      siteLogo = "img/site-logo.png"
      [params.huggingface.markup]
         enableHighlightJS = true

[build]
   noJSConfigInAssets = true
   [build.buildStats]
      enable = false
   [[build.cachebusters]]
      source = 'disabled'
      target = 'disabled'
[markup]
   [markup.highlight]
      noClasses = false
      # lineNos      = true
      # wrapperClass = "custom"
      # hl_inline = true

   [markup.goldmark.renderHooks.image]
      useEmbedded = "always"
   [markup.goldmark.renderHooks.link]
      useEmbedded = "always"

[module]
   [[module.mounts]]
      source = "assets"
      target = "assets"
   [[module.mounts]]
      source = "../_assets"
      target = "assets"
   [[module.mounts]]
      source = "../../work/highlight-hugo-docs.min.js"
      target = "assets/js/highlight-hugo-docs.min.js"

   [[module.mounts]]
      source = "content"
      target = "content"
   [[module.mounts]]
      source = "../_snippets"
      target = "content/_snippets"
   [[module.mounts]]
      source = "../../README.md"
      target = "content/_snippets/README.md"
   [[module.mounts]]
      source = "../../LICENSE"
      target = "content/_snippets/license.md"

   [module.hugoVersion]
      min = '0.164.0'

# top level entries
[[menus.main]]
   name   = 'Highlight.js'
   weight = 10
[[menus.main]]
   name   = 'Discourse'
   weight = 20
[[menus.main]]
   name   = 'Hugo'
   weight = 30

# submenu Highlight.js
[[menus.main]]
   identifier = 'Highlightjs_Overview'
   name       = 'Grammars'
   pageRef    = '/highlightjs'
   parent     = "Highlight.js"
   weight     = 1
[[menus.main]]
   name    = 'CSS Classes'
   pageRef = '/highlightjs/css-class-reference'
   parent  = "Highlight.js"
   weight  = 10
[[menus.main]]
   name    = 'Autodetect'
   pageRef = '/highlightjs/autodetect'
   parent  = "Highlight.js"
   weight  = 20
[[menus.main]]
   identifier = 'Highlightjs_Examples'
   name       = 'Examples'
   pageRef    = '/highlightjs/examples'
   parent     = "Highlight.js"
   weight     = 30

# submenu Discourse.js
[[menus.main]]
   identifier = 'Discourse_Overview'
   name       = 'Theme Components'
   pageRef    = '/discourse'
   parent     = "Discourse"
   weight     = 1
[[menus.main]]
   identifier = 'Discourse_Examples'
   name       = 'Examples'
   pageRef    = '/discourse/examples'
   parent     = "Discourse"
   weight     = 10

# submenu Hugo.js
[[menus.main]]
   identifier = 'Hugo_Overview'
   name       = 'Hugo & Chroma'
   pageRef    = '/hugo'
   parent     = "Hugo"
   weight     = 1
[[menus.main]]
   identifier = 'Hugo_Examples'
   name       = 'Examples'
   pageRef    = '/hugo/examples'
   parent     = "Hugo"
   weight     = 10
