<!doctype html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
  <head>
    {{- partial "head.html" . }}
    <script>
      // initialize data-theme from store if set, otherwise using preferred
      const saved = window.localStorage?.getItem({{ site.Params.huggingface.browserLocalStorageKey }}) || null;
      if (saved) {
        document.documentElement.dataset.theme = saved;
      }
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-left">Logo</div>
      <nav class="header-center">Navigation</nav>
      <div class="header-right">
        <img id="github-mark" width="48px" height="48px" />
        <img id="theme-toggle" width="48px" height="48px" />
      </div>
    </header>

    <main class="site-main">
      {{- block "main" . }}{{- end }}
    </main>

    <footer class="site-footer">
      <div class="footer-left"><p>left</p></div>
      <div class="footer-center">
        {{- partial "footer.html" . }}
      </div>
      <div class="footer-right"><p>right</p></div>
    </footer>
    <script>
      themeToggle.init();
    </script>
  </body>
</html>
