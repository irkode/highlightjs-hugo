<!doctype html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
  <head>
    {{- partial "head.html" . }}
  </head>
  <body>
    <header class="site-header">
      <div class="header-left">Logo</div>
      <nav class="header-center">Navigation</nav>
      <div class="header-right">
        <img id="github-mark" src="http://localhost:1313/highlightjs-hugo/img/github-mark.svg" />
        <img id="theme-toggle" src="http://localhost:1313/highlightjs-hugo/img/auto-theme.svg" />
      </div>
    </header>

    <main class="site-main">
      {{- block "main" . }}{{- end }}
    </main>

    <footer class="site-footer">
      <div class="footer-left">left</div>
      <div class="footer-center">
        {{- partial "footer.html" . }}
      </div>
      <div class="footer-right">right</div>
    </footer>
    <script>
      themeToggle.init();
    </script>
  </body>
</html>
