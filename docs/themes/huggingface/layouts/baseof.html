<!doctype html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
  <head>
    {{- partial "head.html" . }}
  </head>
  <body>
    <input type="checkbox" id="theme-toggle-cb" style="display: none !important" />
    <header class="site-header">
      <div class="header-left">
        <a href="{{ absURL "" }}">
          <img id="site-logo" width="48px" height="48px" alt="Logo" />
        </a>
      </div>
      <div class="header-center">
        {{ partial "navigation/menu.html" (dict "menuID" "main" "page" .) }}
      </div>
      <div class="header-right">
        <img id="github-mark" width="40px" height="40px" />
        <label for="theme-toggle-cb" id="theme-toggle">
          <img id="theme-toggle-icon" width="48px" height="48px" />
        </label>
      </div>
    </header>

    <main class="site-main">
      {{- block "main" . }}{{- end }}
    </main>

    <footer class="site-footer">
      <p>Copyright {{ now.Year }}. All rights reserved.</p>
    </footer>
    {{- partialCached "footer/js.html" . }}
  </body>
</html>
