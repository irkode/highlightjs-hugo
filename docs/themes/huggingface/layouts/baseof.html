<!doctype html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
  <head>
    {{- partial "head.html" . }}
  </head>
  <body>
    <input type="checkbox" id="theme-toggle-cb" style="display: none !important" />
    <header class="site-header">
      <div class="header-left">Logo</div>
      <nav class="header-center">Navigation</nav>
      <div class="header-right">
        <img id="github-mark" width="40px" height="40px" />
        <label for="theme-toggle-cb" id="theme-toggle">
          <img id="theme-toggle-icon" width="48px" height="48px" />
        </label>
      </div>
    </header>

    <main class="site-main">
      {{- block "main" . }}{{- end }}
    </main>

    <footer class="site-footer">
      <div class="footer-left"><p>left</p></div>
      <div class="footer-center">
        {{- partialCached "footer/center.html" . }}
      </div>
      <div class="footer-right"><p>right</p></div>
    </footer>
    {{- partialCached "footer/js.html" . }}
  </body>
</html>
