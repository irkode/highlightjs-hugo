<svg viewBox="0 0 100 100" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <!-- Sun core -->
  <circle cx="50" cy="50" r="25" fill="#ffc83d"></circle>

  <!-- Define a single lightray -->
  <defs>
    <line id="lightray" x1="0" y1="0" x2="0" y2="13" stroke="#ffc83d" stroke-width="4" stroke-linecap="round"></line>
    <line id="darkray" x1="0" y1="0" x2="0" y2="13" stroke="#00b478" stroke-width="4" stroke-linecap="round"></line>
    <mask id="crescent-cut">
      <rect width="100" height="100" fill="white"></rect>
      <circle cx="62" cy="38" r="25" fill="black"></circle>
    </mask>
  </defs>

  <circle cx="50" cy="50" r="25" fill="#00b478" mask="url(#crescent-cut)"></circle>

  <!-- Use lightrays at different positions and rotations -->
  <g transform="translate(50,50)">
    <!-- Vertical lightrays -->
    <use href="#darkray" transform="rotate(0) translate(0,-42)"></use>
    <use href="#lightray" transform="rotate(180) translate(0,-42)"></use>

    <!-- Horizontal lightrays -->
    <use href="#darkray" transform="rotate(90) translate(0,-42)"></use>
    <use href="#lightray" transform="rotate(270) translate(0,-42)"></use>

    <!-- Diagonal lightrays -->
    <use href="#darkray" transform="rotate(45) translate(0,-42)"></use>
    <use href="#lightray" transform="rotate(225) translate(0,-42)"></use>
    <use href="#lightray" transform="rotate(135) translate(0,-42)"></use>
    <use href="#lightray" transform="rotate(315) translate(0,-42)"></use>
  </g>
</svg>
