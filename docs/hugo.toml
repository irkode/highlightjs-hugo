baseURL = "https://irkode.github.io/highlightjs-hugo/"
locale  = 'en-US'
title   = "Highlight 4 Hugo"

description   = "Advanced syntax highlighting for Hugo templates"
disableKinds  = ['rss', 'sitemap', 'taxonomy', 'term']
enableGitInfo = true
theme         = "huggingface"

[build]
   noJSConfigInAssets = true
   [build.buildStats]
      enable = false
   [[build.cachebusters]]
      source = 'DISABLED'
      target = 'DISABLED'
[markup]
   [markup.highlight]
      noClasses = false
      lineNos   = false
   [markup.goldmark.renderHooks.image]
      useEmbedded = "always"
   [markup.goldmark.renderHooks.link]
      useEmbedded = "always"

[module]
   # excludes
   [[module.mounts]]
      source = "static"
      target = "static"
      files  = ['! .keep']
