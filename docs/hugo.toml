baseURL      = "https://irkode.github.io/highlightjs-hugo/"
languageCode = 'en-US'
title        = "Highlight 4 Hugo"
description  = "Advanced syntax highlighting for Hugo templates"
disableKinds = ['rss', 'sitemap', 'taxonomy', 'term']
theme        = "huggingface"

[markup]
  [markup.highlight]
    noClasses = false
    lineNos   = false
  [markup.goldmark.renderHooks.image]
    useEmbedded = "fallback"
  [markup.goldmark.renderHooks.link]
    useEmbedded = "fallback"

[module]
  # github READMEs
  [[module.mounts]]
    source = "../README.md"
    target = "content/_index.md"
  [[module.mounts]]
    source = ".."
    target = "content"
    files  = ['*.png', 'LICENSE']

  # releases
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "../release/highlightjs/hugo-html/README.md"
    target = "content/highlightjs/hugo-html/_index.md"
  [[module.mounts]]
    source = "../release/highlightjs/hugo-text/README.md"
    target = "content/highlightjs/hugo-text/_index.md"
  [[module.mounts]]
    source = "../build/hugen/src/grammars/css-class-reference.md"
    target = "content/highlightjs/css-class-reference/index.md"
  [[module.mounts]]
    source = "../release"
    target = "content"
    files  = ["**/*.png", "**/LICENSE"]
  [[module.mounts]]
    source = ".."
    target = "content"
    files  = ["*.png", "LICENSE"]

  # excludes
  [[module.mounts]]
    source = "static"
    target = "static"
    files  = ['! .keep']

# https://gohugo.io/host-and-deploy/host-on-github-pages/#step-2
[caches]
  [caches.images]
    dir = ':cacheDir/images'
