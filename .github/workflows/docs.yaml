# Triggered by:
#   - workflow_dispatch
#   - a GitHub release being published (re-publishes docs against the final released tag)
name: Publish Documentation

on:
   workflow_dispatch:
   release:
      types: [published]

permissions:
   contents: write

concurrency:
   group: publish-docs-${{ github.ref }}
   cancel-in-progress: false

jobs:
   build:
      uses: ./.github/workflows/_build-core.yaml
      with:
         build-release-artifacts: false
         check-private-repo: false

   docs:
      runs-on: ubuntu-latest
      needs: [build]
      permissions:
         contents: read
         pages: write
         id-token: write
      concurrency:
         group: pages
         cancel-in-progress: false

      steps:
         - name: Deploy to GitHub Pages
           uses: actions/deploy-pages@v5
