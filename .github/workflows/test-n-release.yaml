# coded with friendly help from https://duckduckgo.com/?q=DuckDuckGo+AI+Chat&ia=chat&duckai=1
name: Build Highlight.js with extras (fully cached)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-highlightjs:
    runs-on: ubuntu-latest

    steps:
      # --- Checkout your own repo (highlightjs-hugo)
      - name: Checkout highlightjs-hugo repository
        uses: actions/checkout@v4
        with:
          path: highlightjs-hugo

      # --- Read Highlight.js version from config file
      - name: Read Highlight.js version
        id: hljs-version
        run: |
          VERSION=$(cat highlightjs-hugo/.highlightjs-version | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using Highlight.js version: $VERSION"

      # --- Setup Node.js 22
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # --- Cache the cloned Highlight.js repo
      - name: Cache Highlight.js clone
        id: cache-hljs
        uses: actions/cache@v4
        with:
          path: highlight.js
          key: highlightjs-${{ steps.hljs-version.outputs.version }}

      # --- Clone Highlight.js only if cache missed
      - name: Clone Highlight.js
        if: steps.cache-hljs.outputs.cache-hit != 'true'
        run: |
          git clone --branch ${{ steps.hljs-version.outputs.version }} --depth 1 https://github.com/highlightjs/highlight.js.git

      # --- Cache node_modules from npm ci (depends on package-lock + version)
      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: highlight.js/node_modules
          key: npm-${{ steps.hljs-version.outputs.version }}-${{ hashFiles('highlight.js/package-lock.json') }}

      # --- Copy your custom extras into Highlight.js
      - name: Copy extras from highlightjs-hugo
        run: |
          mkdir -p highlight.js/extra/highlightjs-hugo
          cp -r highlightjs-hugo/* highlight.js/extra/highlightjs-hugo

      # --- Install and build (npm ci skipped if node_modules restored)
      - name: Install dependencies and build
        working-directory: highlight.js
        run: |
          if [ ! -d "node_modules" ] || [ -z "$(ls -A node_modules)" ]; then
            echo "Running npm ci..."
            npm ci
          else
            echo "Using cached node_modules."
          fi
          npm run build

      - name: Execute markup tests
        working-directory: highlight.js
        run: |
          npm run test-markup

      - name: Create Distribution files
        working-directory: highlight.js
        run: |
          node ./tools/build.js hugo -t cdn
          ls -p extra/highlightjs-hugo/dist | grep -v /

      - name: Update version and commit changes
        working-directory: highlightjs-hugo
        run: |
          set -e

          SRC_DIST="../highlight.js/extra/highlightjs-hugo/dist"
          DST_DIST="./dist"
          PKG_FILE="./package.json"

          # Copy built files into highlightjs-hugo/dist
          echo "Copying built dist files..."
          mkdir -p "$DST_DIST"
          cp -r "$SRC_DIST"/* "$DST_DIST"/

          # Check which files changed
          CHANGED_FILES=$(git status --porcelain)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Detect if only .github changed
          ONLY_GITHUB=true
          DIST_CHANGED=false
          OTHER_CHANGED=false

          while read -r line; do
            FILE=$(echo "$line" | awk '{print $2}')
            if [[ "$FILE" == .github/* ]]; then
              continue
            elif [[ "$FILE" == dist/* ]]; then
              DIST_CHANGED=true
              ONLY_GITHUB=false
            else
              OTHER_CHANGED=true
              ONLY_GITHUB=false
            fi
          done <<< "$CHANGED_FILES"

          echo "ONLY_GITHUB=$ONLY_GITHUB, DIST_CHANGED=$DIST_CHANGED, OTHER_CHANGED=$OTHER_CHANGED"

          # Read current version
          OLD_VERSION=$(jq -r '.version' "$PKG_FILE")
          IFS='.' read -r X Y Z <<< "$OLD_VERSION"

          # Decide bump type
          if [ "$ONLY_GITHUB" = true ]; then
            echo "Only .github files changed — keep version"
            NEW_VERSION="$OLD_VERSION"
          elif [ "$DIST_CHANGED" = true ]; then
            echo "Dist changed — bump minor"
            ((Y++))
            Z=0
            NEW_VERSION="${X}.${Y}.${Z}"
          else
            echo "Other source files changed but dist identical — bump patch"
            ((Z++))
            NEW_VERSION="${X}.${Y}.${Z}"
          fi

          echo "New version: $NEW_VERSION"

          # Update package.json
          jq --arg v "$NEW_VERSION" '.version = $v' "$PKG_FILE" > "${PKG_FILE}.tmp" && mv "${PKG_FILE}.tmp" "$PKG_FILE"

          # Commit all changes if version changed or files changed
          git add -A
          git commit -m "chore: bump version to $NEW_VERSION and update dist" || echo "No changes to commit"
          git push || echo "Push failed or no changes"
