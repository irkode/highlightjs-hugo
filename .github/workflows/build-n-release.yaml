# Build on every push.
# Create a GitHub Release when a vX.Y.Z tag is pushed.
name: Build and Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    env:
      # Versions are loaded from '.versions after checkout' and pushed to $ENV
      # GO_VERSION:
      # HUGO_VERSION:
      # NODE_VERSION:
      # HIGHLIGHTJS_VERSION:
      WORK_DIR: ${{ github.workspace }}/work
      HUGO_CACHEDIR: ${{ github.workspace }}/work/hugo-cache
      HIGHLIGHTJS_DIR: ${{ github.workspace }}/work/highlight.js
      HIGHLIGHTJS_EXTRA_DIR: ${{ github.workspace }}/work/highlight.js/extra
      DISTRIBUTION_DIR: ${{ github.workspace }}/release
      ONLY_LANGUAGES: hugo-embed hugo-html hugo-text

    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Tool Versions
        run: |
          ./build/versions-set-wanted.ps1 -Verbose .versions.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: .node.package.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "${{ env.GO_VERSION }}"
          cache: true
          cache-dependency-path: |
            build/hugen/go.sum
            build/hugen/hugo.direct.sum

      - name: Restore Cache - Hugo binary
        id: cache-hugo-bin
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/work/bin
          key: hugo-bin-${{ runner.os }}-${{ env.HUGO_VERSION }}

      - name: Download Hugo
        if: steps.cache-hugo-bin.outputs.cache-hit != 'true'
        run: |
          $url = "https://github.com/gohugoio/hugo/releases/download/v${env:HUGO_VERSION}/hugo_extended_${env:HUGO_VERSION}_linux-amd64.tar.gz"
          Write-Host "Downloading Hugo from $url to ${{ github.workspace }}/work/bin"
          [void](New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/work/bin")
          Invoke-WebRequest -Uri $url -OutFile hugo.tar.gz
          tar -xzf hugo.tar.gz -C "${{ github.workspace }}/work/bin" hugo
          Remove-Item hugo.tar.gz

      - name: Save Cache - Hugo binary
        if: steps.cache-hugo-bin.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/work/bin
          key: hugo-bin-${{ runner.os }}-${{ env.HUGO_VERSION }}

      - name: Add Hugo to Path
        run: |
          "${{ github.workspace }}/work/bin/" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Check Versions
        run: |
          ./build/versions-check-installed.ps1 -Verbose -VersionConfigFile .versions.json

      - name: Restore Cache - Hugo modules
        id: cache-hugo-mod
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.HUGO_CACHEDIR }}
          key: hugo-mod-${{ runner.os }}-${{ env.HUGO_VERSION }}

      - name: Install Hugo modules
        if: steps.cache-hugo-mod.outputs.cache-hit != 'true'
        working-directory: ./build/hugen
        run: |
          hugo mod get

      - name: Save Cache - Hugo modules
        if: steps.cache-hugo-mod.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.HUGO_CACHEDIR }}
          key: hugo-mod-${{ runner.os }}-${{ env.HUGO_VERSION }}

      - name: Restore Cache - Highlight.js
        id: cache-highlightjs
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.HIGHLIGHTJS_DIR }}
          key: highlightjs-${{ runner.os }}-${{ env.HIGHLIGHTJS_VERSION }}

      - name: Clone and Setup Highlight.js
        if: steps.cache-highlightjs.outputs.cache-hit != 'true'
        run: |
          git clone --branch ${{ env.HIGHLIGHTJS_VERSION }} --depth 1 https://github.com/highlightjs/highlight.js.git "${{ env.HIGHLIGHTJS_DIR }}"
          Set-Location "${{ env.HIGHLIGHTJS_DIR }}"
          npm ci
          Write-Host "Highlight.js version folder ready at: ${env:HIGHLIGHTJS_DIR}"

      - name: Save Cache - Highlight.js
        if: steps.cache-highlightjs.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.HIGHLIGHTJS_DIR }}
          key: highlightjs-${{ runner.os }}-${{ env.HIGHLIGHTJS_VERSION }}

      - name: Generate Highlight.js grammars
        working-directory: ./build/hugen
        run: |
          hugo -d ${{ env.HIGHLIGHTJS_EXTRA_DIR }} --cleanDestinationDir --renderSegments grammars

      # On windows this builds only the listed grammars
      # here we get also the common ones - sick
      - name: Build Highlight.js Hugo grammars
        working-directory: ${{ env.HIGHLIGHTJS_DIR }}
        run: |
          node ./tools/build.js -t node ($ENV:ONLY_LANGUAGES -split '\s+')

      # It looks like the `npm run test-markup` on linux does not handle ONLY_EXTRA correctly when
      # enumerating our test files -> it actually ignores all
      # dunno if this is node/npm problem or the implementation of the Highlight.js build scripts or mine
      #
      # WORKAROUND: copy all tests to highlight.js test folder and use $ENV:ONLY_LANGUAGES to set test scope
      - name: Test Highlight.js Hugo markup
        working-directory: ${{ env.HIGHLIGHTJS_DIR }}
        run: |
          foreach ($g in ($ENV:ONLY_LANGUAGES -split '\s+')) {
            foreach ($t in @('detect', 'markup')) {
              mkdir "test/$t/$g"
              cp -R extra/$g/test/$t/* test/$t/$g
            }
          }
          npm run test-markup

      - name: Build CDN plugins Highlight.js
        working-directory: ${{ env.HIGHLIGHTJS_DIR }}
        run: |
          node ./tools/build.js -t cdn ($ENV:ONLY_LANGUAGES -split '\s+')

      - name: Copy Build results to dist folder
        working-directory: ./build/hugen
        run: |
          hugo -d ${{ env.DISTRIBUTION_DIR }} --renderSegments distribute

      - name: Build Discourse Theme Components
        working-directory: ./build/hugen
        run: |
          hugo -d ${{ env.DISTRIBUTION_DIR }} --renderSegments discourse

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release/
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release
          path: release/

      - name: Create release assets
        shell: bash
        run: |
          cd release
          zip -r ../release.zip .
          tar -czf ../release.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release.zip
            release.tar.gz