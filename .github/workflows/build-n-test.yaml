# This is prepared for builing on windows and linux either as matrix or single run
# as of now the ONLY_EXTRA is not considered on linux runner
# It looks like the `npm run test-markup` on linux is not properly enumerating the extra modules
# dunno if this is node/npm problem or the implementation of the Highlight.js build scripts
name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      # Versions are loaded from '.versions after checkout' and pushed to $ENV
      # GO_VERSION:
      # HUGO_VERSION:
      # NODE_VERSION:
      # HIGHLIGHTJS_VERSION:
      ONLY_EXTRA: true
      WORK_DIR: ${{ github.workspace }}/work
      HIGHLIGHTJS_DIR: ${{ github.workspace }}/work/highlight.js
      PUBLISH_DIR: ${{ github.workspace }}/publish
      PLUGINS_DIR: ${{ github.workspace }}/publish/plugins
      HUGO_HTML_DIR: ${{ github.workspace }}/publish/hugo-html
      HUGO_TEXT_DIR: ${{ github.workspace }}/publish/hugo-text

    steps:
      - name: Checkout highlightjs-hugo repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLISH_TOKEN }}
          submodules: "true"

      - name: Set Tool Versions
        run: |
          ./scripts/versions-set-wanted.ps1 -Verbose

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      # SETUP HUGO (install, cache, add to path)
      - name: Cache Hugo binary
        id: cache-hugo
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/work/bin
          key: hugo-${{ runner.os }}-${{ env.HUGO_VERSION }}

      - name: Download Hugo if not cached (Windows)
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}
        run: |
          $url = "https://github.com/gohugoio/hugo/releases/download/v${env:HUGO_VERSION}/hugo_extended_${env:HUGO_VERSION}_windows-amd64.zip"
          Write-Host "Downloading Hugo from $url to ${{ github.workspace }}/work/bin"
          [void](New-Item -ItemType Directory -Force -Path ${{ github.workspace }}/work/bin)
          $archiveName = "hugo.zip"
          Invoke-WebRequest -Uri $url -OutFile $archiveName
          Expand-Archive -Path $archiveName -DestinationPath ${{ github.workspace }}/work/bin -Force
          Remove-Item $archiveName

      - name: Add Hugo to Path
        run: |
          "${{ github.workspace }}/work/bin/" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Check Versions
        run: |
          $env:PATH -split ';' | OUT-HOST
          scripts/versions-check-installed.ps1 -Verbose

      # SETUP Highlight.js (clone, npm ci - cache - save folder path)
      - name: Cache Highlight.js clone and dependencies
        id: cache-highlight
        uses: actions/cache@v4
        with:
          path: ${{ env.HIGHLIGHTJS_DIR }}
          key: highlightjs-${{ runner.os }}-${{ env.HIGHLIGHTJS_VERSION }}

      - name: Clone and Setup Highlight.js
        if: steps.cache-highlight.outputs.cache-hit != 'true'
        run: |
          git clone --branch ${{ env.HIGHLIGHTJS_VERSION }} --depth 1 https://github.com/highlightjs/highlight.js.git "${{ env.HIGHLIGHTJS_DIR }}"
          cd "${{ env.HIGHLIGHTJS_DIR }}"
          npm ci
          npm audit fix
          Write-Host "Highlight.js version folder ready at: ${env:HIGHLIGHTJS_DIR}"

      - name: Checkout highlightjs-hugo-html repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLISH_TOKEN }}
          repository: https://github.com/irkode/highlightjs-hugo-html.git
          path: ${{ env.HIGHLIGHTJS_DIR }}/extra/hugo-html

      - name: Checkout highlightjs-hugo-text repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLISH_TOKEN }}
          repository: https://github.com/irkode/highlightjs-hugo-html.git
          path: ${{ env.HIGHLIGHTJS_DIR }}/extra/hugo-text

      - name: Clean for fresh build
        working-directory: ${{ env.HIGHLIGHTJS_DIR }}
        run: |
          Set-Location ${{ env.HIGHLIGHTJS_DIR }}/extra/hugo-html
          GetChildItem . -Force -Exclude .git | remove-Item -Force -Recurse
          Set-Location ${{ env.HIGHLIGHTJS_DIR }}/extra/hugo-text
          GetChildItem . -Force -Exclude .git | remove-Item -Force -Recurse

      - name: Generate Custom Modules
        working-directory: scripts/hugen
        run: |
          & hugo.exe -d ${{ env.HIGHLIGHTJS_DIR }}/extra

      - name: Build Highlight.js incl. custom modules and CDNs
        working-directory: ${{ env.HIGHLIGHTJS_DIR }}
        run: |
          npm run build
          npm run test-markup
          node ./tools/build.js hugo-text hugo-text -t cdn

      - name: Build Discourse plugin
        working-directory: ${{ github.workspace }}
        run: |
          ./scripts/build-discourse-plugin.ps1 -Verbose "${{ env.HIGHLIGHTJS_DIR }}/extra/hugo-text/dist" "${{env.PLUGINS_DIR}}/discourse"

      - name: Build Highlight.js plugin
        working-directory: ${{ github.workspace }}
        run: |
          ./scripts/build-highlightjs-plugin.ps1 -Verbose "${{ env.HIGHLIGHTJS_DIR }}/extra/hugo-html/dist" "${{env.PLUGINS_DIR}}/highlightjs"

      - name: Update Hugo-Html Publish
        working-directory: ${{ env.HIGHLIGHTJS_DIR }}/extra
        run: |
          Set-Location ${{ env.HIGHLIGHTJS_DIR }}/extra/hugo-html
          git status
          Set-Location ${{ env.HIGHLIGHTJS_DIR }}/extra/hugo-text
          git status
          tree /f ${{env.PLUGINS_DIR}}

